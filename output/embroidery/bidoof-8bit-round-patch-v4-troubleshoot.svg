<g xmlns:ns1="http://www.inkscape.org/namespaces/inkscape" id="__validation_layer__" ns1:label="Troubleshoot" ns1:groupmode="layer"><use xmlns:ns2="http://www.w3.org/1999/xlink" id="use8902" ns1:label="Ink/Stitch Command: Ignore layer (do not stitch any objects in this layer)" ns2:href="#inkstitch_ignore_layer" height="100%" width="100%" x="0" y="-10" transform="scale(3.47222, 3.47222)"/><g id="__validation_warnings__" ns1:label="Warnings"><g ns1:label="Border crosses itself"><path id="inkstitch__invalid_pointer__5013" d="m 134.784,144.0 3.7795275590551185,18.897637795275593 h -7.559055118110237 l 3.7795275590551185,-18.897637795275593" style="stroke:#000000;stroke-width:0.1;fill:#ffdd00" ns1:label="Invalid Pointer" transform="scale(3.47222, 3.47222)"/><text x="134.784" y="170.45669291338584" transform="scale(3.47222, 3.47222)" style="fill:#ffdd00;stroke:#000000;stroke-width:0.1;font-size:7.559055118110237px;text-align:center;text-anchor:middle" ns1:label="Description"><tspan>Border crosses itself</tspan></text></g></g><g ns1:label="Problem descriptions"><path d="M 1000.0 -5, 1165.0 -5, 1165.0 600, 1000.0 600 Z" style="fill: #51a888; stroke: red;"/><text x="1005.0" y="5" style="fill:#000000;font-size:5px;line-height:1;"><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style="font-weight: bold; font-size: 8px;">Troubleshoot</tspan><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style=""></tspan><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style="font-weight: bold; fill: #ffdd00; text-decoration: underline; font-size: 7px;">Warnings</tspan><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style=""></tspan><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style="fill:#ffdd00;">These are problems that won't prevent the shape from being</tspan><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style="fill:#ffdd00;">embroidered. You should consider to fix the warning, but if</tspan><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style="fill:#ffdd00;">you don't, Ink/Stitch will do its best to process the</tspan><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style="fill:#ffdd00;">object.</tspan><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style=""></tspan><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style="font-weight: bold; fill: #ffdd00;">Border crosses itself</tspan><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style="font-size: 3px;">Fill: The border crosses over itself. This may lead into</tspan><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style="font-size: 3px;">unconnected shapes. Please break this object into separate</tspan><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style="font-size: 3px;">shapes to indicate in which order it should be stitched in.</tspan><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style=""></tspan><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style="font-weight: bold; text-decoration: underline; font-size: 4px;">Possible solutions</tspan><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style="font-size: 4px;">* Extensions &gt; Ink/Stitch &gt; Fill Tools &gt; Break Apart Fill</tspan><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style="font-size: 4px;">Objects</tspan><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style=""></tspan><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style="font-style: italic; font-size: 4px;">It is possible, that one object contains more than one</tspan><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style="font-style: italic; font-size: 4px;">error, yet there will be only one pointer per object.  Run</tspan><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style="font-style: italic; font-size: 4px;">this function again, when further errors occur.  Remove</tspan><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style="font-style: italic; font-size: 4px;">pointers by deleting the layer named "Troubleshoot" through</tspan><tspan xmlns:ns1="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd" ns1:role="line" style="font-style: italic; font-size: 4px;">the objects panel (Object -&gt; Objects...).</tspan></text></g></g></svg>