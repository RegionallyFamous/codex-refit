<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="DKC Whammy is a browser prize-board picker with flashing spots, music, Space-to-stop controls, and product results."
    />
    <title>DKC Whammy</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app" class="game-shell">
      <main class="stage">
        <section class="board-zone" aria-label="Prize board">
          <div class="board-frame">
            <div id="board" class="board" aria-live="polite">
              <div class="center-display">
                <img id="idleLogo" class="idle-logo" src="/assets/dkc-whammy-logo.jpg" alt="DKC Whammy" />
                <div id="resultSpot" class="center-spot" hidden></div>
              </div>
            </div>
          </div>
        </section>

        <aside class="control-deck" aria-label="Controls and results">
          <section class="brand" aria-label="Game identity">
            <img class="game-logo" src="/assets/dkc-whammy-logo.jpg" alt="DKC Whammy" />
            <div>
              <span class="eyebrow">Big Board</span>
              <h1>DKC Whammy</h1>
            </div>
          </section>

          <section class="status-panel" aria-live="polite">
            <span>Status</span>
            <strong id="boardStatus">Running</strong>
            <p id="boardHint">Press Space to stop on a product.</p>
          </section>

          <section class="command-panel">
            <button id="stopButton" class="stop-button" type="button">Stop</button>
            <button id="runButton" class="run-button" type="button" disabled>Run</button>
            <button id="soundButton" class="secondary-button" type="button" aria-pressed="true">Sound On</button>
          </section>

          <section class="result-panel" aria-live="polite">
            <div class="result-copy">
              <span>Selected Spot</span>
              <strong id="selectedProduct">Waiting</strong>
              <p id="selectedDetail">The board is running.</p>
            </div>
            <div id="selectedPreview" class="selected-preview" aria-hidden="true"></div>
          </section>

          <section class="history-panel" aria-label="Recent selections">
            <header>
              <span>Recent Picks</span>
            </header>
            <ol id="historyList"></ol>
          </section>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
